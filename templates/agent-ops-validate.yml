name: agent-ops-validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  agent-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Agent Ops contracts
        run: python3 scripts/agent_ops_validate.py --strict
