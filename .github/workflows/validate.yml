name: validate

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  public-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate public safety and structure
        run: python3 scripts/validate_public_repo.py
      - name: Validate Agent Ops contracts
        run: python3 scripts/agent_ops_validate.py --strict
      - name: Run validator regression tests
        run: python3 tests/validator_selftest.py
      - name: Run Agent Ops initializer self-test
        run: python3 tests/init_selftest.py
      - name: Run Agent Ops validator self-test
        run: python3 tests/agent_ops_validate_selftest.py
      - name: Run Agent Ops runtime guard self-test
        run: python3 tests/agent_ops_guard_selftest.py
